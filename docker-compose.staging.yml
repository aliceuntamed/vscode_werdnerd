version: '3.8'

services:
  app:
    image: ghcr.io/yourusername/werdnerd:latest
    container_name: werdnerd-app-staging
    ports:
      - "80:80"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - NODE_ENV=production
    env_file:
      - .env.staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - werdnerd-net

  certbot:
    image: certbot/certbot:latest
    container_name: werdnerd-certbot-staging
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot -d staging.yourdomain.com; sleep 12h & wait $${!}; done;'"
    networks:
      - werdnerd-net
    restart: unless-stopped

networks:
  werdnerd-net:
    driver: bridge
