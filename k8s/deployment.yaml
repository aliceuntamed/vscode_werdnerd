apiVersion: v1
kind: Namespace
metadata:
  name: werdnerd

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: werdnerd-config
  namespace: werdnerd
data:
  VITE_SUPABASE_URL: "https://your-supabase-url.supabase.co"
  NODE_ENV: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: werdnerd-secrets
  namespace: werdnerd
type: Opaque
stringData:
  VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: "your-key-here"
  VITE_SUPABASE_ANON_KEY: "your-anon-key-here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: werdnerd-app
  namespace: werdnerd
  labels:
    app: werdnerd
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: werdnerd
  template:
    metadata:
      labels:
        app: werdnerd
    spec:
      containers:
      - name: werdnerd
        image: ghcr.io/yourusername/werdnerd:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        envFrom:
        - configMapRef:
            name: werdnerd-config
        - secretRef:
            name: werdnerd-secrets
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: werdnerd-service
  namespace: werdnerd
  labels:
    app: werdnerd
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: werdnerd

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: werdnerd-hpa
  namespace: werdnerd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: werdnerd-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
